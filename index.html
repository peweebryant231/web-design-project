<!DOCTYPE html>
<html lang="en-US">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="profile" href="https://gmpg.org/xfn/11">

	<title>Sweet Palm Bakery – Just another WordPress site</title>
	<meta name='robots' content='max-image-preview:large' />

	<link rel='stylesheet' id='dashicons-css' href='http://localhost/wordpress/wp-includes/css/dashicons.min.css?ver=6.5.2' media='all' />
	<link rel='stylesheet' id='admin-bar-css' href='http://localhost/wordpress/wp-includes/css/admin-bar.min.css?ver=6.5.2' media='all' />
	<link rel='stylesheet' id='astra-theme-css-css' href='http://localhost/wordpress/wp-content/themes/astra/assets/css/minified/main.min.css?ver=4.6.14' media='all' />

	<style id='astra-theme-css-inline-css'>
		:root {
			--ast-container-default-xlg-padding: 6.66em;
			--ast-container-default-lg-padding: 4em;
			--ast-container-default-slg-padding: 2em;
			--ast-container-default-md-padding: 3em;
			--ast-container-default-sm-padding: 2.5em;
			--ast-container-default-xs-padding: 2em;
			--ast-block-page-container-spacing: 40px;
			--ast-reference-buttons-standard-padding-top: 14px;
			--ast-reference-buttons-standard-padding-right: 28px;
			--ast-reference-buttons-standard-padding-bottom: 14px;
			--ast-reference-buttons-standard-padding-left: 28px;
			--ast-global-color-0: #046bd2;
			--ast-global-color-1: #045cb5;
			--ast-global-color-2: #1e293b;
			--ast-global-color-3: #334155;
			--ast-global-color-4: #F0F5FA;
			--ast-global-color-5: #FFFFFF;
			--ast-global-color-6: #ADB5BD;
			--ast-global-color-7: #111111;
			--ast-global-color-8: #111111;
			--ast-border-color: #e2e8f0;
		}

		html {
			font-size: 100%;
			-webkit-text-size-adjust: 100%;
			-ms-text-size-adjust: 100%;
		}

		body {
			margin: 0;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			line-height: 1.6;
			background-color: var(--ast-global-color-4);
			color: var(--ast-global-color-2);
		}

		.site-header {
			background-color: var(--ast-global-color-5);
			padding: var(--ast-container-default-slg-padding);
			text-align: center;
			border-bottom: 1px solid var(--ast-global-color-6);
		}

		.ast-container {
			max-width: 1240px;
			margin: 0 auto;
			padding: var(--ast-container-default-lg-padding);
		}

		h1.site-title {
			color: var(--ast-global-color-0);
			font-size: 3rem;
			margin: 0;
		}

		.entry-content {
			background: var(--ast-global-color-5);
			padding: 40px;
			margin-top: 20px;
			border-radius: 4px;
		}
	</style>
	<link rel='stylesheet' id='astra-google-fonts-css' href='https://fonts.googleapis.com/css?family=Inter%3A400%2C600&#038;display=fallback&#038;ver=4.6.14' media='all' />
</head>

<body class="home blog ast-desktop">

	<header class="site-header">
		<h1 class="site-title">Sweet Palm Bakery</h1>
		<p class="site-description">Freshly Baked Every Day</p>
	</header>

	<div class="ast-container">
		<main class="entry-content">
			<h2>Welcome to the Bakery</h2>
			<p>Your artisanal breads and pastries are being prepared. This section contains the full layout for your project.</p>
			
			<hr style="margin: 30px 0; border: 0; border-top: 1px solid var(--ast-global-color-6);">
			
			<h3>Contact Us</h3>
			<p>For more information, feel free to reach out via email.</p>
			<a href="mailto:info@sweetpalmbakery.com" style="background: var(--ast-global-color-0); color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; display: inline-block;">Send Email</a>
		</main>
	</div>

</body>
</html>
